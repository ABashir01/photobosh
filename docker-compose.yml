services:
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_SEGMENTER_MODEL_URL: ${VITE_SEGMENTER_MODEL_URL}
    expose:
      - "80"
    depends_on:
      - api

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - photobosh-generated:/app/generated
    expose:
      - "8000"

volumes:
  photobosh-generated:
