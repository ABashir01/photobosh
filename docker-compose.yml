services:
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_SEGMENTER_MODEL_URL: ${VITE_SEGMENTER_MODEL_URL}
    expose:
      - "80"
    depends_on:
      - api

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - photobosh-generated:/app/generated
    expose:
      - "8000"

  turn:
    image: coturn/coturn:4.6.3-r0
    env_file:
      - .env
    command: >
      -n
      --fingerprint
      --lt-cred-mech
      --realm=${TURN_PUBLIC_HOST}
      --user=${TURN_USERNAME}:${TURN_PASSWORD}
      --listening-port=${TURN_PORT}
      --min-port=${TURN_MIN_PORT}
      --max-port=${TURN_MAX_PORT}
      --no-multicast-peers
      --no-loopback-peers
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}:${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}/udp"

volumes:
  photobosh-generated:
